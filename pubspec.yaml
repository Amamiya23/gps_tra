name: gpx_photo_geotagger
description: Offline Android JPG geotagging app using GPX tracks.
publish_to: none

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.2
  path: ^1.9.0
  xml: ^6.6.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
